
   <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderna</title>
    <style>
        /* --- ESTILIZAÇÃO CSS --- */
        
        /* Reset básico e definição de fonte */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fundo do site com um gradiente moderno */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Caixa principal da calculadora */
        .calculadora-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Estilização dos campos de entrada (inputs) */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            color: #666;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #764ba2;
        }

        /* Botão de calcular */
        button {
            width: 100%;
            padding: 14px;
            background-color: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #5a377e;
        }

        /* Área onde os resultados vão aparecer */
        .resultados {
            margin-top: 25px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
            text-align: left;
        }

        .resultado-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #4a5568;
            font-size: 16px;
        }

        .resultado-item span {
            font-weight: bold;
            color: #1a202c;
        }
    </style>
</head>
<body>

    <div class="calculadora-card">
        <h2>Minha Calculadora</h2>
        
        <div class="input-group">
            <label for="num1">Primeiro Número</label>
            <input type="number" id="num1" placeholder="Ex: 10">
        </div>

        <div class="input-group">
            <label for="num2">Segundo Número</label>
            <input type="number" id="num2" placeholder="Ex: 5">
        </div>

        <button onclick="calcular()">Calcular Operações</button>

        <div class="resultados">
            <div class="resultado-item">Soma: <span id="resSoma">-</span></div>
            <div class="resultado-item">Subtração: <span id="resSub">-</span></div>
            <div class="resultado-item">Multiplicação: <span id="resMult">-</span></div>
            <div class="resultado-item">Divisão: <span id="resDiv">-</span></div>
        </div>
    </div>

    <script>
        function calcular() {
            // Pega os valores direto dos inputs da tela
            let n1 = Number(document.getElementById('num1').value);
            let n2 = Number(document.getElementById('num2').value);

            // Realiza os cálculos
            let soma = n1 + n2;
            let subtracao = n1 - n2;
            let multiplicacao = n1 * n2;
            // Valida se o segundo número é zero para não dar erro de divisão por zero
            let divisao = n2 !== 0 ? (n1 / n2).toFixed(2) : "Não é possível dividir por 0";

            // Coloca os resultados direto nas tags HTML correspondentes
            document.getElementById('resSoma').innerText = soma;
            document.getElementById('resSub').innerText = subtracao;
            document.getElementById('resMult').innerText = multiplicacao;
            document.getElementById('resDiv').innerText = divisao;
        }
    </script>

</body>
</html>
